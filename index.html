<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Браконьер — Охота на сердца</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d0b0f;
    --paper:#e8e1d0;
    --blood:#c81d3f;
    --blood-dark:#8c1330;
    --toxic:#7a9a3f;
    --gold:#d1a13f;
    --violet:#3a2540;
    --panel-shadow: 5px 5px 0 var(--ink);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--ink);}
  body{
    font-family:'Rubik',sans-serif;
    color:var(--paper);
    background:
      radial-gradient(circle at 50% 0%, var(--violet) 0%, var(--ink) 65%);
    background-image:
      radial-gradient(var(--ink) 1px, transparent 1px),
      radial-gradient(circle at 50% 0%, var(--violet) 0%, var(--ink) 65%);
    background-size: 10px 10px, cover;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:10px;
  }
  h1{
    font-family:'Bangers', cursive;
    letter-spacing:2px;
    font-size:34px;
    color:var(--blood);
    -webkit-text-stroke:1.5px var(--ink);
    text-shadow:3px 3px 0 var(--ink);
    margin:6px 0 2px 0;
    text-align:center;
  }
  .subtitle{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--paper);
    opacity:.7;
    margin-bottom:10px;
  }

  /* HUD */
  .hud{
    display:flex;
    gap:8px;
    width:100%;
    max-width:420px;
    margin-bottom:10px;
  }
  .stat{
    flex:1;
    background:var(--paper);
    color:var(--ink);
    border:3px solid var(--ink);
    border-radius:10px;
    box-shadow:var(--panel-shadow);
    padding:6px 8px;
    text-align:center;
  }
  .stat .label{
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:1px;
    opacity:.6;
    font-weight:600;
  }
  .stat .value{
    font-family:'Bangers',cursive;
    font-size:22px;
    line-height:1;
  }
  .stat.hearts .value{color:var(--blood-dark);}
  .stat.moves .value{color:var(--violet);}
  .stat.cash .value{color:#8a6a1a;}

  /* Goal banner */
  .goal{
    width:100%;
    max-width:420px;
    background:var(--blood);
    border:3px solid var(--ink);
    border-radius:10px;
    box-shadow:var(--panel-shadow);
    padding:8px 12px;
    margin-bottom:12px;
    font-size:13px;
    font-weight:600;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .goal b{font-family:'Bangers',cursive;font-size:16px;letter-spacing:1px;}

  /* Board */
  #board{
    display:grid;
    gap:4px;
    background:var(--ink);
    border:4px solid var(--ink);
    border-radius:14px;
    box-shadow: 6px 6px 0 rgba(0,0,0,.5);
    padding:6px;
    touch-action:none;
    max-width:min(420px, 94vw);
  }
  .tile{
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    background:var(--paper);
    border-radius:8px;
    border:2px solid var(--ink);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, opacity .18s ease;
    position:relative;
  }
  .tile.selected{
    transform:scale(1.12) rotate(-4deg);
    box-shadow:0 0 0 3px var(--gold);
    z-index:2;
  }
  .tile.clearing{
    transform:scale(0);
    opacity:0;
  }
  .tile.dropping{
    animation:drop .22s ease-out;
  }
  @keyframes drop{
    from{transform:translateY(-24px);}
    to{transform:translateY(0);}
  }
  .tile.pop::after{
    content:"";
    position:absolute;
    inset:-6px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.9) 0%, rgba(255,255,255,0) 70%);
    animation:pop .3s ease-out forwards;
    pointer-events:none;
  }
  @keyframes pop{
    from{opacity:1; transform:scale(.4);}
    to{opacity:0; transform:scale(1.6);}
  }

  .footer{
    margin-top:14px;
    font-size:11px;
    opacity:.55;
    text-align:center;
    max-width:340px;
  }

  #toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--paper);
    color:var(--ink);
    border:3px solid var(--ink);
    border-radius:10px;
    box-shadow:var(--panel-shadow);
    padding:10px 18px;
    font-family:'Bangers',cursive;
    font-size:18px;
    letter-spacing:1px;
    opacity:0;
    transition:all .25s ease;
    pointer-events:none;
    z-index:50;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .overlay{
    position:fixed;inset:0;
    background:rgba(13,11,15,.92);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .overlay.hidden{display:none;}
  .card{
    background:var(--paper);
    color:var(--ink);
    border:4px solid var(--ink);
    border-radius:16px;
    box-shadow:8px 8px 0 var(--blood);
    padding:24px;
    max-width:360px;
    text-align:center;
  }
  .card h2{
    font-family:'Bangers',cursive;
    font-size:28px;
    color:var(--blood-dark);
    margin:0 0 8px 0;
  }
  .card p{font-size:14px; line-height:1.5;}
  .btn{
    font-family:'Bangers',cursive;
    letter-spacing:1px;
    font-size:18px;
    background:var(--blood);
    color:var(--paper);
    border:3px solid var(--ink);
    border-radius:10px;
    box-shadow:4px 4px 0 var(--ink);
    padding:10px 24px;
    margin-top:12px;
    cursor:pointer;
    transition:transform .1s;
  }
  .btn:active{transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink);}
</style>
</head>
<body>

  <h1>БРАКОНЬЕР</h1>
  <div class="subtitle">Охота на сердца · Пролог</div>

  <div class="hud">
    <div class="stat hearts"><div class="label">Сердца</div><div class="value" id="heartsVal">0</div></div>
    <div class="stat moves"><div class="label">Ходы</div><div class="value" id="movesVal">20</div></div>
    <div class="stat cash"><div class="label">Выручка</div><div class="value" id="cashVal">0₽</div></div>
  </div>

  <div class="goal">
    <span>Заказ скупщика:</span>
    <b id="goalText">12 ❤️ вампирских сердец</b>
  </div>

  <div id="board"></div>

  <div class="footer">Свайпай или тапай соседние ячейки, чтобы поменять местами. Собери 3+ одинаковых, чтобы зачистить блок.</div>

  <div id="toast"></div>

  <div class="overlay hidden" id="overlay">
    <div class="card">
      <h2 id="overlayTitle">Заказ выполнен!</h2>
      <p id="overlayText"></p>
      <button class="btn" id="overlayBtn">Продолжить охоту</button>
    </div>
  </div>

<script>
(function(){
  // Telegram Mini App init (безопасно работает и вне Telegram)
  try{
    const tg = window.Telegram && window.Telegram.WebApp;
    if(tg){ tg.ready(); tg.expand(); }
  }catch(e){}

  // ==== НАСТРОЙКИ ИГРЫ ====
  const SIZE = 8;
  const TYPES = [
    {id:'heart',  icon:'🫀', label:'сердце'},
    {id:'bullet', icon:'🔫', label:'патрон'},
    {id:'garlic', icon:'🧄', label:'чеснок'},
    {id:'stake',  icon:'🗡️', label:'кол'},
    {id:'vial',   icon:'🧪', label:'святая вода'},
    {id:'coin',   icon:'💰', label:'монеты'},
  ];
  const GOAL_HEARTS = 12;
  const START_MOVES = 20;

  let grid = [];
  let selected = null;
  let hearts = 0, moves = START_MOVES, cash = 0;
  let busy = false;

  const boardEl = document.getElementById('board');
  const heartsVal = document.getElementById('heartsVal');
  const movesVal = document.getElementById('movesVal');
  const cashVal = document.getElementById('cashVal');
  const toastEl = document.getElementById('toast');
  const overlay = document.getElementById('overlay');

  function randType(){ return TYPES[Math.floor(Math.random()*TYPES.length)].id; }

  function idx(r,c){ return r*SIZE+c; }

  function buildInitialGrid(){
    grid = new Array(SIZE*SIZE).fill(null).map(()=>randType());
    // убираем случайные совпадения на старте
    let guard = 0;
    while(findMatches().length && guard < 500){
      findMatches().forEach(i=>{ grid[i] = randType(); });
      guard++;
    }
  }

  function render(){
    boardEl.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
    boardEl.innerHTML = '';
    grid.forEach((type, i)=>{
      const t = TYPES.find(x=>x.id===type);
      const div = document.createElement('div');
      div.className = 'tile';
      div.dataset.i = i;
      div.textContent = t.icon;
      div.addEventListener('click', onTileClick);
      boardEl.appendChild(div);
    });
  }

  function onTileClick(e){
    if(busy) return;
    const i = parseInt(e.currentTarget.dataset.i,10);
    if(selected === null){
      selected = i;
      e.currentTarget.classList.add('selected');
      return;
    }
    if(selected === i){
      e.currentTarget.classList.remove('selected');
      selected = null;
      return;
    }
    const r1=Math.floor(selected/SIZE), c1=selected%SIZE;
    const r2=Math.floor(i/SIZE), c2=i%SIZE;
    const adjacent = (Math.abs(r1-r2)+Math.abs(c1-c2))===1;
    document.querySelectorAll('.tile.selected').forEach(el=>el.classList.remove('selected'));
    if(!adjacent){
      selected = i;
      e.currentTarget.classList.add('selected');
      return;
    }
    trySwap(selected, i);
    selected = null;
  }

  function trySwap(a,b){
    swap(a,b);
    const matches = findMatches();
    if(matches.length === 0){
      // невалидный ход — откатываем
      swap(a,b);
      render();
      pulseToast('Нет совпадения');
      return;
    }
    busy = true;
    moves--;
    movesVal.textContent = moves;
    render();
    resolveMatches();
  }

  function swap(a,b){
    const tmp = grid[a];
    grid[a] = grid[b];
    grid[b] = tmp;
  }

  function findMatches(){
    const toClear = new Set();
    // горизонталь
    for(let r=0;r<SIZE;r++){
      let run=1;
      for(let c=1;c<=SIZE;c++){
        const cur = c<SIZE ? grid[idx(r,c)] : null;
        const prev = grid[idx(r,c-1)];
        if(cur === prev){ run++; }
        else{
          if(run>=3){ for(let k=0;k<run;k++) toClear.add(idx(r,c-1-k)); }
          run=1;
        }
      }
    }
    // вертикаль
    for(let c=0;c<SIZE;c++){
      let run=1;
      for(let r=1;r<=SIZE;r++){
        const cur = r<SIZE ? grid[idx(r,c)] : null;
        const prev = grid[idx(r-1,c)];
        if(cur === prev){ run++; }
        else{
          if(run>=3){ for(let k=0;k<run;k++) toClear.add(idx(r-1-k,c)); }
          run=1;
        }
      }
    }
    return Array.from(toClear);
  }

  function resolveMatches(){
    const matches = findMatches();
    if(matches.length === 0){
      busy = false;
      checkEndConditions();
      return;
    }
    // подсчёт добычи
    let heartsGained = 0, cashGained = 0;
    matches.forEach(i=>{
      const t = grid[i];
      if(t === 'heart') heartsGained++;
      if(t === 'coin') cashGained += 5;
      const el = boardEl.children[i];
      if(el) el.classList.add('clearing','pop');
    });
    hearts += heartsGained;
    cash += cashGained + heartsGained*15;
    heartsVal.textContent = hearts;
    cashVal.textContent = cash + '₽';

    setTimeout(()=>{
      matches.forEach(i=>{ grid[i] = null; });
      applyGravity();
      render();
      setTimeout(()=>resolveMatches(), 260);
    }, 220);
  }

  function applyGravity(){
    for(let c=0;c<SIZE;c++){
      let pointer = SIZE-1;
      for(let r=SIZE-1;r>=0;r--){
        const i = idx(r,c);
        if(grid[i] !== null){
          grid[idx(pointer,c)] = grid[i];
          if(pointer!==r) grid[i] = null;
          pointer--;
        }
      }
      for(let r=pointer;r>=0;r--){
        grid[idx(r,c)] = randType();
      }
    }
  }

  function pulseToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 900);
  }

  function checkEndConditions(){
    if(hearts >= GOAL_HEARTS){
      showOverlay('Заказ выполнен!', `Ты насобирал ${hearts} сердец и заработал ${cash}₽. Скупщик доволен — можно возвращаться в бункер за патронами.`);
      return;
    }
    if(moves <= 0){
      showOverlay('Ходы закончились', `Собрано ${hearts} из ${GOAL_HEARTS} сердец. Патроны на исходе — пора отступать в бункер и пробовать снова.`);
    }
  }

  function showOverlay(title, text){
    document.getElementById('overlayTitle').textContent = title;
    document.getElementById('overlayText').textContent = text;
    overlay.classList.remove('hidden');
  }

  document.getElementById('overlayBtn').addEventListener('click', ()=>{
    overlay.classList.add('hidden');
    hearts=0; moves=START_MOVES; cash=0;
    heartsVal.textContent=0; movesVal.textContent=moves; cashVal.textContent='0₽';
    buildInitialGrid();
    render();
  });

  document.getElementById('goalText').textContent = `${GOAL_HEARTS} ❤️ вампирских сердец`;

  buildInitialGrid();
  render();
})();
</script>
</body>
</html>
